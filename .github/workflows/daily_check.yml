name: Tu dong phan tich co phieu

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code tu Github
        uses: actions/checkout@v3

      - name: Cai dat Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cai dat thu vien # DAY LA BUOC QUAN TRONG
        run: |
          pip install vnstock3 pandas numpy matplotlib

      - name: Chay file phan tich
        run: python analysis.py
