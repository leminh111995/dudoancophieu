name: Tu dong phan tich co phieu

on:
  schedule:
    # Chạy vào 02:00 UTC (tức 09:00 sáng Việt Nam) mỗi ngày từ Thứ 2 đến Thứ 6
    - cron: '0 2 * * 1-5'
  workflow_dispatch: # Giúp bạn có thể bấm nút chạy tay bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code tu Github
        uses: actions/checkout@v3

      - name: Cai dat Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cai dat thu vien
        run: |
          pip install yfinance matplotlib pandas

      - name: Chay file phan tich
        run: python analysis.py
